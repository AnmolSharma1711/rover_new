<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rover BLE Controller - Python Native</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', 'Monaco', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1729 100%);
            color: #00ff88;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-y: auto;
        }
        
        h2 {
            font-size: 32px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
            letter-spacing: 2px;
            font-weight: 900;
        }
        
        .subtitle {
            color: #00ffff;
            font-size: 12px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            letter-spacing: 3px;
        }
        
        .connect-btn, .voice-btn, .project-btn, .stop-btn {
            border: 2px solid;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            padding: 12px 35px;
            margin: 5px;
        }
        
        .connect-btn {
            background: linear-gradient(135deg, #0066ff, #00ccff);
            color: white;
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin-bottom: 20px;
        }
        
        .connect-btn:hover {
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
            transform: translateY(-2px);
        }
        
        #status {
            margin: 15px 0;
            padding: 12px 20px;
            border-radius: 10px;
            background: rgba(0, 50, 100, 0.6);
            border: 2px solid #00ff88;
            width: 90%;
            max-width: 350px;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
            box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.2);
        }
        
        .control-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .voice-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .voice-btn {
            background: linear-gradient(135deg, #ff0080, #ff8c00);
            color: white;
            border-color: #ff0080;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.5);
        }
        
        .voice-btn:hover {
            box-shadow: 0 0 30px rgba(255, 0, 128, 0.8);
            transform: translateY(-2px);
        }
        
        .voice-btn.recording {
            background: linear-gradient(135deg, #ff0000, #ff0080);
            animation: neon-pulse 0.6s infinite;
            box-shadow: 0 0 40px rgba(255, 0, 128, 1);
        }
        
        @keyframes neon-pulse {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(255, 0, 128, 0.8), 0 0 40px rgba(255, 0, 128, 0.4);
            }
            50% { 
                box-shadow: 0 0 40px rgba(255, 0, 128, 1), 0 0 60px rgba(255, 0, 128, 0.6);
            }
        }
        
        .voice-transcript {
            background: rgba(0, 30, 60, 0.8);
            color: #00ff88;
            padding: 12px 20px;
            border-radius: 8px;
            min-height: 20px;
            font-size: 13px;
            width: 90%;
            max-width: 350px;
            border: 1px solid #00ff88;
            box-shadow: inset 0 0 15px rgba(0, 255, 136, 0.1);
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
        }
        
        .project-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 380px;
            margin-top: 20px;
        }
        
        .project-btn {
            background: linear-gradient(135deg, #00ff88, #00ffcc);
            border-color: #00ff88;
            border-radius: 12px;
            color: #001a00;
            font-size: 15px;
            font-weight: 800;
            padding: 18px 15px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }
        
        .project-btn:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
            transform: translateY(-3px);
        }
        
        .project-btn:active {
            transform: translateY(-1px);
            box-shadow: 0 0 40px rgba(0, 255, 136, 1);
        }
        
        .stop-btn-container {
            margin-top: 20px;
        }
        
        .stop-btn {
            background: linear-gradient(135deg, #ff0000, #ff6600);
            border-color: #ff0000;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            padding: 20px 30px;
            min-width: 120px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
        }
        
        .stop-btn:hover {
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.9);
            transform: scale(1.05);
        }
        
        .stop-btn:active {
            transform: scale(0.98);
        }
        
        .divider {
            width: 90%;
            max-width: 350px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            margin: 20px 0;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        input[type="file"] {
            display: none;
        }

        .info-box {
            background: rgba(0, 100, 150, 0.3);
            border: 1px solid #00ffff;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
            font-size: 12px;
            color: #00ffff;
        }
    </style>
</head>
<body>

    <h2>◄► ROVER CONTROL ◄►</h2>
    <div class="subtitle">━━ PYTHON-NATIVE BLE ━━</div>
    
    <button class="connect-btn" id="connectBtn" onclick="connectToRover()">🔗 CONNECT TO ROVER</button>
    <div id="status">Status: DISCONNECTED</div>

    <div class="control-container">
        
        <div class="voice-section">
            <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceInput()">🎤 VOICE INPUT</button>
            <input type="file" id="audioFile" accept="audio/*" onchange="processAudioFile(event)">
            <div class="voice-transcript" id="voiceTranscript">Click button to record voice command...</div>
            <div class="info-box" id="infoBox">🐍 Loading system info...</div>
        </div>
        
        <div class="divider"></div>
        
        <div class="project-panel">
            <button class="project-btn" onclick="sendProjectCommand(1)">PROJECT 1</button>
            <button class="project-btn" onclick="sendProjectCommand(2)">PROJECT 2</button>
            <button class="project-btn" onclick="sendProjectCommand(3)">PROJECT 3</button>
            <button class="project-btn" onclick="sendProjectCommand(4)">PROJECT 4</button>
        </div>
        
        <div class="stop-btn-container">
            <button class="stop-btn" onclick="stopRover()">STOP</button>
        </div>

    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const voiceTranscript = document.getElementById('voiceTranscript');
        const voiceBtn = document.getElementById('voiceBtn');
        const audioFile = document.getElementById('audioFile');
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        async function connectToRover() {
            try {
                statusDiv.innerText = "Status: CONNECTING...";
                const response = await fetch('/api/ble/connect', { method: 'POST' });
                const data = await response.json();
                
                if (response.ok) {
                    statusDiv.innerText = "Status: CONNECTED ✓";
                    statusDiv.style.borderColor = "#00ff88";
                    statusDiv.style.boxShadow = "0 0 20px rgba(0, 255, 136, 0.6)";
                } else {
                    statusDiv.innerText = "Status: CONNECTION FAILED";
                    statusDiv.style.borderColor = "#ff0000";
                }
            } catch (error) {
                statusDiv.innerText = "ERROR: " + error.message;
            }
        }

        async function toggleVoiceInput() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                isRecording = true;

                voiceBtn.classList.add('recording');
                voiceBtn.textContent = '🎤 RECORDING...';
                voiceTranscript.textContent = '▶ Recording audio...';

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    await sendAudioToServer(audioBlob);
                };

                mediaRecorder.start();
            } catch (error) {
                voiceTranscript.textContent = '⚠ Microphone error: ' + error.message;
                console.error('Recording error:', error);
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.textContent = '🎤 VOICE INPUT';
                voiceTranscript.textContent = '▶ Processing audio...';
            }
        }

        async function sendAudioToServer(audioBlob) {
            try {
                const formData = new FormData();
                formData.append('audio', audioBlob, 'audio.wav');

                voiceTranscript.textContent = '▶ Sending to server...';
                const response = await fetch('/api/recognize-speech', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    voiceTranscript.textContent = `✓ DETECTED: "${data.transcript}"`;
                    if (data.project_detected) {
                        voiceTranscript.textContent += ` → PROJECT ${data.project_detected}`;
                    }
                } else {
                    voiceTranscript.textContent = `✗ Error: ${data.error}`;
                }
            } catch (error) {
                voiceTranscript.textContent = `⚠ Server error: ${error.message}`;
                console.error('Upload error:', error);
            }
        }

        function processAudioFile(event) {
            const file = event.target.files[0];
            if (file) {
                sendAudioToServer(file);
            }
        }

        async function sendProjectCommand(projectNum) {
            try {
                statusDiv.innerText = `Status: PROJECT ${projectNum} ACTIVE`;
                statusDiv.style.borderColor = "#00ffcc";
                
                const response = await fetch(`/api/project/${projectNum}`, { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    voiceTranscript.textContent = `✓ PROJECT ${projectNum} COMMAND SENT`;
                }
            } catch (error) {
                statusDiv.innerText = "ERROR: " + error.message;
            }
        }

        async function stopRover() {
            try {
                statusDiv.innerText = "Status: STOPPED";
                statusDiv.style.borderColor = "#00ff88";
                
                const response = await fetch('/api/stop', { method: 'POST' });
                const data = await response.json();
                
                voiceTranscript.textContent = '✓ Rover stopped';
            } catch (error) {
                statusDiv.innerText = "ERROR: " + error.message;
            }
        }

        // Get initial status
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                console.log('App Status:', data);
                
                // Update info box based on available features
                const infoBox = document.getElementById('infoBox');
                let infoText = '🐍 Python-native speech recognition';
                
                if (data.ble_available) {
                    infoText += ' | 🔌 BLE connected';
                } else {
                    infoText += ' | ⚠ BLE not available (cloud mode)';
                }
                
                infoBox.textContent = infoText;
            } catch (error) {
                console.error('Status check failed:', error);
            }
        }

        updateStatus();
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
