<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rover BLE Controller</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', 'Monaco', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1729 100%);
            color: #00ff88;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-y: auto;
        }
        
        h2 {
            font-size: 32px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
            letter-spacing: 2px;
            font-weight: 900;
        }
        
        .subtitle {
            color: #00ffff;
            font-size: 12px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            letter-spacing: 3px;
        }
        
        .connect-btn {
            background: linear-gradient(135deg, #0066ff, #00ccff);
            color: white;
            padding: 12px 35px;
            border: 2px solid #00ffff;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        
        .connect-btn:hover {
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
            transform: translateY(-2px);
        }
        
        .connect-btn:active {
            transform: translateY(0);
        }
        
        #status {
            margin: 15px 0;
            padding: 12px 20px;
            border-radius: 10px;
            background: rgba(0, 50, 100, 0.6);
            border: 2px solid #00ff88;
            width: 90%;
            max-width: 350px;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
            box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.2);
        }
        
        .control-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .voice-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .voice-btn {
            background: linear-gradient(135deg, #ff0080, #ff8c00);
            color: white;
            padding: 14px 40px;
            border: 2px solid #ff0080;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.5);
        }
        
        .voice-btn:hover {
            box-shadow: 0 0 30px rgba(255, 0, 128, 0.8);
            transform: translateY(-2px);
        }
        
        .voice-btn.listening {
            background: linear-gradient(135deg, #ff0080, #ff0000);
            animation: neon-pulse 0.6s infinite;
            box-shadow: 0 0 40px rgba(255, 0, 128, 1);
        }
        
        @keyframes neon-pulse {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(255, 0, 128, 0.8), 0 0 40px rgba(255, 0, 128, 0.4);
            }
            50% { 
                box-shadow: 0 0 40px rgba(255, 0, 128, 1), 0 0 60px rgba(255, 0, 128, 0.6);
            }
        }
        
        .voice-transcript {
            background: rgba(0, 30, 60, 0.8);
            color: #00ff88;
            padding: 12px 20px;
            border-radius: 8px;
            min-height: 20px;
            font-size: 13px;
            width: 90%;
            max-width: 350px;
            border: 1px solid #00ff88;
            box-shadow: inset 0 0 15px rgba(0, 255, 136, 0.1);
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
        }
        
        .project-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 380px;
            margin-top: 20px;
        }
        
        .project-btn {
            background: linear-gradient(135deg, #00ff88, #00ffcc);
            border: 2px solid #00ff88;
            border-radius: 12px;
            color: #001a00;
            font-size: 15px;
            font-weight: 800;
            padding: 18px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }
        
        .project-btn:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
            transform: translateY(-3px);
        }
        
        .project-btn:active {
            transform: translateY(-1px);
            box-shadow: 0 0 40px rgba(0, 255, 136, 1);
        }
        
        .stop-btn-container {
            margin-top: 20px;
        }
        
        .stop-btn {
            background: linear-gradient(135deg, #ff0000, #ff6600);
            border: 2px solid #ff0000;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 20px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
            min-width: 120px;
        }
        
        .stop-btn:hover {
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.9);
            transform: scale(1.05);
        }
        
        .stop-btn:active {
            transform: scale(0.98);
        }
        
        .divider {
            width: 90%;
            max-width: 350px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            margin: 20px 0;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
    </style>
</head>
<body>

    <h2>◄► ROVER CONTROL ◄►</h2>
    <div class="subtitle">━━ BLE COMMAND CENTER ━━</div>
    
    <button class="connect-btn" id="connectBtn">🔗 CONNECT TO ROVER</button>
    <div id="status">Status: DISCONNECTED</div>

    <div class="control-container">
        
        <div class="voice-section">
            <button class="voice-btn" id="voiceBtn">🎤 VOICE INPUT</button>
            <div class="voice-transcript" id="voiceTranscript">Ready for voice commands...</div>
        </div>
        
        <div class="divider"></div>
        
        <div class="project-panel">
            <button class="project-btn" onclick="sendProjectCommand('1')">PROJECT 1</button>
            <button class="project-btn" onclick="sendProjectCommand('2')">PROJECT 2</button>
            <button class="project-btn" onclick="sendProjectCommand('3')">PROJECT 3</button>
            <button class="project-btn" onclick="sendProjectCommand('4')">PROJECT 4</button>
        </div>
        
        <div class="stop-btn-container">
            <button class="stop-btn" id="btn-s" onclick="sendCommand('S')">STOP</button>
        </div>

    </div>

    <script>
        // The UUIDs must exactly match your Arduino Uno BLE code
        const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const UART_RX_CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        
        // Word to Project Mapping
        const wordProjectMap = {
            'project1': ['generator', 'system'],
            'project2': ['drone', 'fire'],
            'project3': ['rickshaw', 'alcohol'],
            'project4': ['water', 'management']
        };
        
        let bleDevice;
        let rxCharacteristic;
        let projectModeActive = false;
        let activeProject = null;
        const statusDiv = document.getElementById('status');
        const voiceTranscript = document.getElementById('voiceTranscript');
        const voiceBtn = document.getElementById('voiceBtn');
        
        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isListening = false;
        let shouldKeepListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.language = 'en-US';
            recognition.maxAlternatives = 1;
            
            console.log('Speech Recognition initialized');

            recognition.onstart = () => {
                isListening = true;
                voiceBtn.classList.add('listening');
                voiceBtn.textContent = '🎤 LISTENING...';
                voiceTranscript.textContent = '▶ LISTENING FOR COMMANDS...';
                console.log('Speech recognition started');
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';
                let hasValidFinal = false;

                console.log(`Result event: resultIndex=${event.resultIndex}, results.length=${event.results.length}`);

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const result = event.results[i];
                    
                    // Get transcript with fallback to empty string
                    const transcript = (result && result.transcript) ? result.transcript.toLowerCase().trim() : '';
                    
                    console.log(`Result ${i}: isFinal=${result.isFinal}, transcript="${transcript}", confidence=${result[0] ? result[0].confidence : 'N/A'}`);
                    
                    if (result.isFinal) {
                        if (transcript.length > 0) {
                            finalTranscript += transcript + ' ';
                            hasValidFinal = true;
                        }
                    } else {
                        if (transcript.length > 0) {
                            interimTranscript += transcript;
                        }
                    }
                }

                // Display transcript
                const finalTrimmed = finalTranscript.trim();
                const interimTrimmed = interimTranscript.trim();
                const displayText = finalTrimmed || interimTrimmed || '▶ LISTENING FOR COMMANDS...';
                voiceTranscript.textContent = displayText;
                console.log(`Display: "${displayText}"`);

                // Process final transcript for project keywords (only if we got a valid final result)
                if (hasValidFinal && finalTrimmed.length > 0) {
                    console.log('Final transcript received:', finalTrimmed);
                    processVoiceCommand(finalTrimmed);
                }
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                
                // Map error codes to user-friendly messages
                const errorMessages = {
                    'no-speech': '⚠ No speech detected. Please try again.',
                    'audio-capture': '⚠ Microphone not available.',
                    'network': '⚠ Network error. Check connection.',
                    'not-allowed': '⚠ Microphone permission denied.',
                    'bad-grammar': '⚠ Speech format error.'
                };
                
                const message = errorMessages[event.error] || `⚠ Error: ${event.error}`;
                voiceTranscript.textContent = message;
                
                // Auto-restart listening after short delay for minor errors
                if (shouldKeepListening && (event.error === 'no-speech' || event.error === 'audio-capture')) {
                    console.log('Auto-restarting speech recognition after error...');
                    setTimeout(() => {
                        if (shouldKeepListening && recognition) {
                            try {
                                isListening = true;
                                recognition.start();
                            } catch (e) {
                                console.error('Failed to restart after error:', e);
                            }
                        }
                    }, 500);
                }
            };

            recognition.onend = () => {
                isListening = false;
                voiceBtn.classList.remove('listening');
                voiceBtn.textContent = '🎤 VOICE INPUT';
                console.log('Speech recognition ended. shouldKeepListening:', shouldKeepListening);
                
                // Auto-restart if still supposed to be listening (browser may stop it automatically)
                if (shouldKeepListening && recognition) {
                    console.log('Auto-restarting recognition...');
                    setTimeout(() => {
                        try {
                            isListening = true;
                            recognition.start();
                        } catch (e) {
                            console.error('Failed to restart:', e);
                        }
                    }, 100);
                }
            };

            voiceBtn.addEventListener('click', () => {
                if (isListening) {
                    console.log('Stopping speech recognition');
                    shouldKeepListening = false;
                    recognition.stop();
                } else {
                    try {
                        console.log('Starting speech recognition');
                        shouldKeepListening = true;
                        isListening = true;
                        recognition.start();
                    } catch (error) {
                        console.error('Error starting recognition:', error);
                        voiceTranscript.textContent = '⚠ Cannot start voice input. Reload page.';
                    }
                }
            });
        } else {
            voiceBtn.textContent = '❌ NOT SUPPORTED';
            voiceBtn.disabled = true;
            voiceTranscript.textContent = '⚠ Web Speech API not supported';
        }

        function processVoiceCommand(transcript) {
            if (!transcript || transcript.trim().length === 0) {
                console.log('Empty transcript, skipping processing');
                return;
            }
            
            const words = transcript.toLowerCase().split(/\s+/);
            console.log('Processing voice command. Words:', words);
            
            // Check against all project keywords
            for (const [project, keywords] of Object.entries(wordProjectMap)) {
                for (const keyword of keywords) {
                    if (words.includes(keyword)) {
                        const projectNumber = project.replace('project', '');
                        console.log(`Voice match found - Keyword: ${keyword}, Project: ${projectNumber}`);
                        voiceTranscript.textContent = `✓ DETECTED: "${keyword}" → PROJECT ${projectNumber}`;
                        sendProjectCommand(projectNumber);
                        return;
                    }
                }
            }
            
            console.log('No matching keywords found in:', transcript);
            voiceTranscript.textContent = `✗ NO MATCH: "${transcript}"`;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                statusDiv.innerText = "Status: SCANNING...";
                
                // 1. Request the device (Requires user gesture like a click)
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'RoverBLE' }],
                    optionalServices: [UART_SERVICE_UUID]
                });

                // 2. Connect to the GATT server
                statusDiv.innerText = "Status: CONNECTING...";
                const server = await bleDevice.gatt.connect();

                // 3. Get the UART Service
                const service = await server.getPrimaryService(UART_SERVICE_UUID);

                // 4. Get the RX Characteristic (to write data to the rover)
                rxCharacteristic = await service.getCharacteristic(UART_RX_CHAR_UUID);

                statusDiv.innerText = "Status: CONNECTED ✓";
                statusDiv.style.borderColor = "#00ff88";
                statusDiv.style.boxShadow = "0 0 20px rgba(0, 255, 136, 0.6)";

                // Handle disconnects
                bleDevice.addEventListener('gattserverdisconnected', () => {
                    statusDiv.innerText = "Status: DISCONNECTED";
                    statusDiv.style.borderColor = "#ff0000";
                    statusDiv.style.boxShadow = "0 0 20px rgba(255, 0, 0, 0.3)";
                    projectModeActive = false;
                    activeProject = null;
                });

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "ERROR: " + error.message;
            }
        });

        async function writeBleCommand(cmd) {
            if (!rxCharacteristic) {
                console.log("Not connected - rxCharacteristic is null");
                voiceTranscript.textContent = `⚠ NOT CONNECTED - Please connect to rover first`;
                return false;
            }
            try {
                // Convert the string character ('F', 'B', etc.) into an array of bytes to send over BLE
                let encoder = new TextEncoder('utf-8');
                let data = encoder.encode(cmd);
                console.log("Sending BLE command:", cmd, "Data:", data);
                await rxCharacteristic.writeValue(data);
                console.log("Successfully sent to BLE:", cmd);
                return true;
            } catch (error) {
                console.error("Write Error:", error);
                voiceTranscript.textContent = `⚠ BLE Send Error: ${error.message}`;
                return false;
            }
        }

        async function sendCommand(cmd) {
            // Manual commands are ignored while project mode is active.
            if (projectModeActive && cmd !== 'S') {
                console.log("Manual command ignored: project mode is active.");
                return;
            }

            if (cmd === 'S') {
                projectModeActive = false;
                activeProject = null;
                statusDiv.innerText = "Status: STOPPED";
                statusDiv.style.borderColor = "#00ff88";
            }

            await writeBleCommand(cmd);
        }

        async function sendProjectCommand(projectCode) {
            console.log("sendProjectCommand called with code:", projectCode);
            
            if (!rxCharacteristic) {
                console.log("NOT CONNECTED - Cannot send project command");
                voiceTranscript.textContent = `⚠ NOT CONNECTED - Please connect to rover first`;
                statusDiv.innerText = "Status: CONNECT FIRST";
                statusDiv.style.borderColor = "#ff6600";
                return;
            }
            
            projectModeActive = true;
            activeProject = projectCode;
            statusDiv.innerText = `Status: PROJECT ${projectCode} ACTIVE`;
            statusDiv.style.borderColor = "#00ffcc";
            const success = await writeBleCommand(projectCode);
            if (success) {
                console.log("Project command sent successfully via voice");
                voiceTranscript.textContent = `✓ PROJECT ${projectCode} COMMAND SENT`;
            } else {
                console.log("Project command failed to send");
                voiceTranscript.textContent = `⚠ FAILED TO SEND - Check connection`;
            }
        }

    </script>
</body>
</html>
