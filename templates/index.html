<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rover BLE Controller</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        #status {
            margin: 20px 0;
            padding: 10px;
            border-radius: 8px;
            background-color: #333;
            width: 80%;
            max-width: 300px;
        }
        .connect-btn {
            background-color: #007bff;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 40px;
        }
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(3, 80px);
            gap: 15px;
            justify-content: center;
        }
        .control-btn {
            background-color: #4CAF50;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            touch-action: manipulation; /* Prevents mobile double-tap zoom delay */
            user-select: none;
            cursor: pointer;
        }
        .control-btn:active { background-color: #45a049; transform: scale(0.95); }
        .stop-btn { background-color: #f44336; }
        .stop-btn:active { background-color: #d32f2f; }
        
        /* Grid Placement */
        #btn-f { grid-column: 2; grid-row: 1; }
        #btn-l { grid-column: 1; grid-row: 2; }
        #btn-s { grid-column: 2; grid-row: 2; }
        #btn-r { grid-column: 3; grid-row: 2; }
        #btn-b { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <h2>Rover Command Center</h2>
    
    <button class="connect-btn" id="connectBtn">Connect to RoverBLE</button>
    <div id="status">Status: Disconnected</div>

    <div class="d-pad">
        <button class="control-btn" id="btn-f" onmousedown="sendCommand('F')" onmouseup="sendCommand('S')" ontouchstart="sendCommand('F')" ontouchend="sendCommand('S')">F</button>
        <button class="control-btn" id="btn-l" onmousedown="sendCommand('L')" onmouseup="sendCommand('S')" ontouchstart="sendCommand('L')" ontouchend="sendCommand('S')">L</button>
        <button class="control-btn stop-btn" id="btn-s" onclick="sendCommand('S')">STP</button>
        <button class="control-btn" id="btn-r" onmousedown="sendCommand('R')" onmouseup="sendCommand('S')" ontouchstart="sendCommand('R')" ontouchend="sendCommand('S')">R</button>
        <button class="control-btn" id="btn-b" onmousedown="sendCommand('B')" onmouseup="sendCommand('S')" ontouchstart="sendCommand('B')" ontouchend="sendCommand('S')">B</button>
    </div>

    <script>
        // The UUIDs must exactly match your Arduino Uno BLE code
        const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const UART_RX_CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        
        let bleDevice;
        let rxCharacteristic;
        const statusDiv = document.getElementById('status');

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                statusDiv.innerText = "Status: Scanning...";
                
                // 1. Request the device (Requires user gesture like a click)
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'RoverBLE' }],
                    optionalServices: [UART_SERVICE_UUID]
                });

                // 2. Connect to the GATT server
                statusDiv.innerText = "Status: Connecting...";
                const server = await bleDevice.gatt.connect();

                // 3. Get the UART Service
                const service = await server.getPrimaryService(UART_SERVICE_UUID);

                // 4. Get the RX Characteristic (to write data to the rover)
                rxCharacteristic = await service.getCharacteristic(UART_RX_CHAR_UUID);

                statusDiv.innerText = "Status: Connected & Ready!";
                statusDiv.style.backgroundColor = "#4CAF50";

                // Handle disconnects
                bleDevice.addEventListener('gattserverdisconnected', () => {
                    statusDiv.innerText = "Status: Disconnected";
                    statusDiv.style.backgroundColor = "#f44336";
                });

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Error: " + error.message;
            }
        });

        async function sendCommand(cmd) {
            if (!rxCharacteristic) {
                console.log("Not connected yet.");
                return;
            }
            try {
                // Convert the string character ('F', 'B', etc.) into an array of bytes to send over BLE
                let encoder = new TextEncoder('utf-8');
                let data = encoder.encode(cmd);
                await rxCharacteristic.writeValue(data);
                console.log("Sent:", cmd);
            } catch (error) {
                console.error("Write Error:", error);
            }
        }
    </script>
</body>
</html>
